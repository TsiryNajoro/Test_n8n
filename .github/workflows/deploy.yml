name: Trigger n8n Deployment

on:
  registry_package:
    types: [published]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Ensures the event is a container and specifically filters out the digest-only trigger
    if: |
      github.event.registry_package.package_type == 'container' && 
      github.event.registry_package.package_version.container_metadata.tag.name != null
    runs-on: self-hosted

    steps:
      - name: Send webhook to n8n
        run: |
          TAG="${{ github.event.registry_package.package_version.container_metadata.tag.name }}"

          echo "📦 Déploiement du tag : $TAG"

          curl -X POST http://localhost:5678/webhook/deploy \
            -H "Content-Type: application/json" \
            -d "{\"tag\":\"$TAG\"}"

          echo "Webhook envoyé à n8n"
