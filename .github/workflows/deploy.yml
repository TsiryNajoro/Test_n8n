name: Trigger n8n Deployment

on:
  registry_package:
    types: [published]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:

    runs-on: self-hosted

    permissions:
      packages: read

    steps:

      - name: Get package version
        id: package
        run: |

          PACKAGE_URL="${{ github.event.registry_package.package_version.package_url }}"

          echo "Package URL: $PACKAGE_URL"

          TAG="${PACKAGE_URL##*:}"

          echo "Tag trouvé: $TAG"

          if [ -z "$TAG" ]; then
            echo "Pas de tag, on ignore"
            exit 0
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT


      - name: Send webhook to n8n
        if: steps.package.outputs.tag != ''
        run: |

          TAG="${{ steps.package.outputs.tag }}"

          echo "📦 Déploiement du tag : $TAG"

          curl -X POST http://localhost:5678/webhook/deploy \
            -H "Content-Type: application/json" \
            -d "{\"tag\":\"$TAG\"}"

          echo "Webhook envoyé à n8n"