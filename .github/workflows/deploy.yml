name: Trigger n8n Deployment

on:
  registry_package:
    types: [published]
  

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Send webhook to n8n
        run: |
          IMAGE_NAME="${{ github.event.package.name }}"
          TAG="${{ github.event.package.package_version.metadata.container.tags[0] }}"
          
          echo "Nouvelle image détectée : $IMAGE_NAME:$TAG"
          
          curl -X POST https://prescribe-whinny-species.ngrok-free.dev/webhook/deploy\
            -H "Content-Type: application/json" \
            -d '{
              "image": "'"$IMAGE_NAME"'",
              "tag": "'"$TAG"'",
              "repository": "'"${{ github.repository }}"'",
              "timestamp": "'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"
            }'
          
          echo "✅ Webhook envoyé à n8n"