name: Trigger n8n Deployment

on:
  registry_package:
    types: [published]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.registry_package.package_version.container_metadata.tag.name != ''

    runs-on: self-hosted

    permissions:
      packages: read

    steps:

      - name: Get package version
        id: package
        run: |
          TAG="${{ github.event.registry_package.package_version.container_metadata.tag.name }}"

          echo "Tag trouvé: $TAG"

          echo "tag=$TAG" >> $GITHUB_OUTPUT


      - name: Send webhook to n8n
        run: |
          TAG="${{ steps.package.outputs.tag }}"

          echo "📦 Déploiement du tag : $TAG"

          curl -X POST http://localhost:5678/webhook/deploy \
            -H "Content-Type: application/json" \
            -d "{\"tag\":\"$TAG\"}"

          echo "Webhook envoyé à n8n"