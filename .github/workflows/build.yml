name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/tsirynajoro/test_n8n:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ghcr.io/tsirynajoro/test_n8n:${{ github.sha }}

      - name: Trigger n8n deployment
        run: |
          echo "📦 Déploiement du tag : ${{ github.sha }}"

          curl -X POST https://prescribe-whinny-species.ngrok-free.dev/webhook/deploy \
            -H "Content-Type: application/json" \
            -d '{
              "tag": "${{ github.sha }}"
            }'

          echo "Webhook envoyé à n8n"